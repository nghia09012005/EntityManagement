spring:
  application:
    name: EntityManagement

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

    consumer:
      group-id: soc-parser-group        # default group (ParserWorker)
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    # Topic names — referenced via KafkaTopicConstants
    # soc-enrichment-group: normalized-events consumer (EnrichmentWorker)
    # soc-graph-group:      enriched-events consumer  (GraphWorker)
    # dead-letter-queue:    failed events from any worker

  data:
    redis:
      host: localhost
      port: 6379

      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

    mongodb:
      uri: mongodb://root:root@localhost:27017/soc_db?authSource=admin

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: password123

minio:
  url: http://localhost:9000
  access-key: admin
  secret-key: password123
  bucket-name: uploads

