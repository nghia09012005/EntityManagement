apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: soc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: soc/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # Mount thêm config K8s vào Spring Boot
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: file:/app/config/
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits:   { memory: "768Mi", cpu: "500m" }
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: soc
spec:
  selector:
    app: backend
  ports:
    - port: 8080
