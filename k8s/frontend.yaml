apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: soc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: soc/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests: { memory: "32Mi",  cpu: "50m" }
            limits:   { memory: "128Mi", cpu: "100m" }
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: soc
spec:
  selector:
    app: frontend
  ports:
    - port: 80
