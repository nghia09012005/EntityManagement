apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soc-ingress
  namespace: soc
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: soc.local
      http:
        paths:
          # API — proxy thẳng vào backend
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          # Frontend SPA — mọi path còn lại
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
