apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: soc
data:
  # Spring Boot override cho môi trường K8s
  # Inject qua env SPRING_CONFIG_ADDITIONAL_LOCATION hoặc mount vào /app/config/
  application-k8s.yaml: |
    spring:
      data:
        mongodb:
          uri: mongodb://root:root@mongodb:27017/socdb?authSource=admin
        neo4j:
          uri: bolt://neo4j:7687
          authentication:
            username: neo4j
            password: password123
        redis:
          host: redis
          port: 6379
      kafka:
        bootstrap-servers: kafka:29092
    minio:
      endpoint: http://minio:9000
      access-key: admin
      secret-key: password123
      bucket: soc-logs
