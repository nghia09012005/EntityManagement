# Cấu hình cào dữ liệu (Prometheus scrape config)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: soc
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # 1. Chỉ cào những pod có annotation: prometheus.io/scrape: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # 2. Lấy port từ annotation: prometheus.io/port: "8080"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: (\d+)
            target_label: __address__
            replacement: $1
---
# Triển khai Prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: soc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config-volume
          mountPath: /etc/prometheus/
      volumes:
      - name: config-volume
        configMap:
          name: prometheus-config
---
# Service để Grafana kết nối vào
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: soc
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090