name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Cần quyền này để comment vào PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests + coverage check
        run: mvn verify --batch-mode --no-transfer-progress

      - name: Generate Coverage Summary
        if: always()
        run: |
          # Xử lý summary và thêm vào Github Step Summary
          echo "## 📊 Test & Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build & Test:** Success" >> $GITHUB_STEP_SUMMARY
          
          # Đoạn awk của bạn (đã tinh chỉnh chút để hiện thị đẹp hơn)
          awk -F',' 'NR==1 {next} {im+=$4; ic+=$5; bm+=$6; bc+=$7; lm+=$8; lc+=$9} 
          END {
            printf "| Metric | Covered | Total | %% |\n|---|---|---|---|\n"
            printf "| Instruction | %d | %d | **%.1f%%** |\n", ic, ic+im, 100*ic/(ic+im)
            printf "| Branch      | %d | %d | **%.1f%%** |\n", bc, bc+bm, 100*bc/(bc+bm)
            printf "| Line        | %d | %d | **%.1f%%** |\n", lc, lc+lm, 100*lc/(lc+lm)
          }' target/site/jacoco/jacoco.csv >> $GITHUB_STEP_SUMMARY
          
          echo -e "\n🔗 **[Xem chi tiết báo cáo HTML](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})**" >> $GITHUB_STEP_SUMMARY

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request' && always()
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 📊 Coverage Summary
            Kiểm tra chi tiết báo cáo tại [Artifacts của workflow này](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
            *(Báo cáo HTML có sẵn trong phần Artifacts)*