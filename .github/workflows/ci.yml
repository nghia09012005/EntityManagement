name: "CI Pipeline Pro"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # 1. Kiểm tra lỗ hổng bảo mật trong Dependency
      - name: Dependency Check
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      # 2. Build & Test chuyên sâu
      - name: Build with Maven
        run: mvn clean verify -DskipTests=false

      # 3. Chèn báo cáo Coverage chuyên nghiệp vào PR
      - name: Add Coverage Report to PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80 # Fail build nếu tổng coverage < 80%
          min-coverage-changed-files: 80 # Fail build nếu code mới coverage < 80%

      # 4. Lưu Artifacts để trace lỗi
      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/site/jacoco/
            target/surefire-reports/